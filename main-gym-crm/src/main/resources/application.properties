spring.application.name=main-gym-crm
spring.profiles.active=dev

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always

jwt.secret=
jwt.expirationMs=36000000

app.security.m2m-secret=

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{transactionId}] %msg%n

spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=
spring.activemq.password=

jms.queue.workload=trainer.workload.queue
